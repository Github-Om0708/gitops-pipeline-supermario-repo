name: "Run SAST Scan on SuperMario Game Project"

on:
  push:
    branches:
      - main
  
jobs:

  sonarqube_sast_scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0  # Shallow clones should be disabled for better analysis relevance

      - name: SonarQube Scan
        uses: sonarsource/sonarqube-scan-action@master
        env:
         SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
         args: >
          -Dsonar.organization=your_sonar_cloud_organization_key
          -Dsonar.projectKey=gitiopsdevsecopspipeline
